name: Jazz Drive Direct Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *' # Backup ke liye: Agar bot galti se ruk jaye toh har 5 ghante baad khud restart hoga

jobs:
  run_bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write # Naya workflow auto-start karne ke liye permission zaroori hai

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Tools
        run: |
          pip install playwright pyTelegramBotAPI
          playwright install chromium

      - name: Run Bot (24/7 Loop Mode)
        timeout-minutes: 350 # 6 hours se pehle band karega taake naya start ho sake
        continue-on-error: true
        run: python upload.py

      - name: Save Session
        if: always()
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add state.json
          git commit -m "Save Login" || exit 0
          git push

      - name: Auto-Restart Trigger 🔄
        if: always()
        run: |
          echo "Bot ka session purana ho gaya hai, naya start ho raha hai..."
          curl -X POST -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/actions/workflows/run.yml/dispatches \
          -d '{"ref":"main"}'
